<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Result Management System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav>
        <div class="nav-brand">Student Result System</div>
        <div class="nav-links">
            <a href="{{ url_for('main.index') }}">Dashboard</a>
            <a href="{{ url_for('students.list_students') }}">Students</a>
            <a href="{{ url_for('results.list_results') }}">Results</a>
            <a href="{{ url_for('students.add_student') }}">Add Student</a>
            <a href="{{ url_for('results.add_result') }}">Add Result</a>
        </div>
    </nav>
    <div class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </div>
</body>
</html>
