{% extends "base.html" %}
{% block content %}
<div class="page-header">
    <h1>Students</h1>
    <a href="{{ url_for('students.add_student') }}" class="btn">Add Student</a>
</div>
<table>
    <thead>
        <tr>
            <th>Name</th><th>Roll Number</th>
            <th>Email</th><th>Department</th><th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for student in students %}
        <tr>
            <td>{{ student.name }}</td>
            <td>{{ student.roll_number }}</td>
            <td>{{ student.email }}</td>
            <td>{{ student.department }}</td>
            <td>
                <a href="{{ url_for('results.student_results', student_id=student.id) }}">Results</a>
                <form method="POST"
                      action="{{ url_for('students.delete_student', student_id=student.id) }}"
                      style="display:inline"
                      onsubmit="return confirm('Delete this student?')">
                    <button type="submit" class="btn-danger">Delete</button>
                </form>
            </td>
        </tr>
        {% else %}
        <tr><td colspan="5">No students found</td></tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
